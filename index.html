<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080604"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>DoubtZero X | Sachiin K</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold2: #8b5e10;
    --gold-dim: rgba(201,168,76,0.15);
    --bg: #080604;
    --bg2: rgba(8,6,4,0.97);
    --text: #e8dcc8;
    --muted: #7a6030;
    --blue: #7ec8e3;
    --red: #e05a4a;
  }
  html, body {
    height: 100dvh; width: 100%;
    background: var(--bg); color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  @keyframes dzPulse    { 0%,100%{opacity:.06} 50%{opacity:.14} }
  @keyframes dzShimmer  { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes dzRing     { 0%{box-shadow:0 0 0 0 rgba(201,168,76,.5)} 70%{box-shadow:0 0 0 18px rgba(201,168,76,0)} 100%{box-shadow:0 0 0 0 rgba(201,168,76,0)} }
  @keyframes dzFadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes dzFade     { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes dzBounce   { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }
  @keyframes dzWave     { 0%,100%{height:4px} 50%{height:22px} }
  @keyframes dzMicPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.7),0 0 24px rgba(201,168,76,.3)} 50%{box-shadow:0 0 0 14px rgba(201,168,76,0),0 0 24px rgba(201,168,76,.3)} }
  @keyframes dzSpeakPulse { 0%,100%{box-shadow:0 0 0 0 rgba(126,200,227,.5)} 50%{box-shadow:0 0 0 12px rgba(126,200,227,0)} }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }

  #splash, #chat { position: fixed; inset: 0; transition: opacity .4s ease, transform .4s ease; }
  #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow: hidden; }
  #splash.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }
  #chat { display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: scale(1.02); }
  #chat.visible { opacity: 1; pointer-events: all; transform: scale(1); }

  .grid-bg { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px); background-size: 48px 48px; animation: dzPulse 4s ease infinite; }
  .glow-bg { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse at center, rgba(201,168,76,.07) 0%, transparent 65%); }

  .splash-inner { position: relative; text-align: center; max-width: 480px; width: 100%; animation: dzFadeUp .7s ease; }
  .logo-mark { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 24px; background: linear-gradient(135deg, var(--gold), #5a3800); display: flex; align-items: center; justify-content: center; font-size: 28px; animation: dzRing 2.5s infinite; box-shadow: 0 0 40px rgba(201,168,76,.25); }
  .eyebrow { font-size: 10px; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; opacity: .7; }
  .logo-text { font-size: clamp(36px,10vw,58px); font-weight: 800; letter-spacing: -1px; background: linear-gradient(90deg, var(--gold), #f5d878, var(--gold)); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: dzShimmer 3s linear infinite; margin-bottom: 4px; }
  .tagline { color: var(--muted); font-size: 14px; line-height: 1.7; margin: 14px 0 28px; }

  .mode-toggle { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .mode-btn { padding: 10px 24px; border-radius: 50px; font-family: Georgia, serif; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .5px; transition: all .2s; border: 1px solid rgba(201,168,76,.2); background: transparent; color: var(--muted); }
  .mode-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--bg); border-color: transparent; box-shadow: 0 4px 20px rgba(201,168,76,.3); }

  .cta-btn { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--bg); border: none; border-radius: 50px; padding: 14px 44px; font-size: 15px; font-family: Georgia, serif; font-weight: 700; cursor: pointer; letter-spacing: .5px; box-shadow: 0 6px 28px rgba(201,168,76,.35); transition: transform .2s, box-shadow .2s; -webkit-appearance: none; }
  .cta-btn:active { transform: scale(.97); }
  .fine-print { color: #2e2510; font-size: 11px; margin-top: 18px; letter-spacing: 1.5px; text-transform: uppercase; }

  #header { padding: 11px 16px; border-bottom: 1px solid rgba(201,168,76,.1); display: flex; align-items: center; gap: 12px; background: var(--bg2); backdrop-filter: blur(8px); flex-shrink: 0; z-index: 10; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--gold), #5a3800); display: flex; align-items: center; justify-content: center; font-size: 13px; box-shadow: 0 0 12px rgba(201,168,76,.3); }
  .header-name { color: #f0e6cc; font-weight: 700; font-size: 14px; letter-spacing: .3px; }
  .header-status { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; transition: color .3s; }
  .header-mode { margin-left: auto; display: flex; background: rgba(255,255,255,.04); border-radius: 50px; padding: 3px; gap: 2px; border: 1px solid rgba(201,168,76,.1); }
  .hm-btn { padding: 5px 12px; border-radius: 50px; font-family: Georgia, serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .2s; border: none; background: transparent; color: #5a4820; letter-spacing: .5px; }
  .hm-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--bg); }

  #messages { flex: 1; overflow-y: auto; padding: 18px 14px; max-width: 680px; width: 100%; margin: 0 auto; -webkit-overflow-scrolling: touch; }
  .bubble-row { display: flex; margin-bottom: 13px; animation: dzFade .35s ease forwards; }
  .bubble-row.user { justify-content: flex-end; padding-left: 48px; }
  .bubble-row.bot  { justify-content: flex-start; padding-right: 48px; }
  .bub-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--gold), #7a4f0a); display: flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 8px; margin-top: 2px; box-shadow: 0 0 10px rgba(201,168,76,.35); }
  .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; max-width: 100%; letter-spacing: .1px; word-break: break-word; }
  .bubble.user { background: linear-gradient(135deg, var(--gold), #9a6510); border-radius: 18px 18px 4px 18px; color: #0d0a04; box-shadow: 0 3px 16px rgba(201,168,76,.2); }
  .bubble.bot { background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.13); border-radius: 18px 18px 18px 4px; color: var(--text); }
  .typing-dots { display: flex; gap: 5px; padding: 10px 14px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: .5; }
  .dot:nth-child(1){ animation: dzBounce 1.1s 0s infinite ease-in-out; }
  .dot:nth-child(2){ animation: dzBounce 1.1s .18s infinite ease-in-out; }
  .dot:nth-child(3){ animation: dzBounce 1.1s .36s infinite ease-in-out; }

  #chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; padding-left: 38px; animation: dzFade .5s .2s both ease; }
  .chip { background: transparent; border: 1px solid rgba(201,168,76,.25); border-radius: 50px; padding: 6px 13px; color: var(--gold); font-size: 12px; font-family: Georgia, serif; cursor: pointer; transition: all .18s; line-height: 1.4; -webkit-appearance: none; }
  .chip:active { background: rgba(201,168,76,.15); }

  #input-area { border-top: 1px solid rgba(201,168,76,.1); background: var(--bg2); backdrop-filter: blur(8px); flex-shrink: 0; padding: 12px 14px 14px; padding-bottom: max(14px, env(safe-area-inset-bottom)); }
  .text-row { max-width: 680px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea#msg { flex: 1; background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.18); border-radius: 14px; padding: 10px 14px; color: var(--text); font-size: 15px; font-family: Georgia, serif; line-height: 1.6; max-height: 120px; overflow-y: auto; resize: none; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  textarea#msg:focus { border-color: rgba(201,168,76,.45); }
  textarea#msg::placeholder { color: #3a2e14; }
  .send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; cursor: pointer; transition: all .2s; -webkit-appearance: none; }
  .send-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--bg); box-shadow: 0 3px 14px rgba(201,168,76,.3); }
  .send-btn.inactive { background: rgba(255,255,255,.04); color: #444; cursor: not-allowed; }
  .hint { text-align: center; color: #1e1a0e; font-size: 10px; margin-top: 7px; letter-spacing: 1.5px; text-transform: uppercase; }

  #voice-area { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 11px; }
  #transcript-box { background: rgba(201,168,76,.06); border: 1px solid rgba(201,168,76,.15); border-radius: 12px; padding: 8px 16px; color: var(--gold); font-size: 13px; font-style: italic; text-align: center; max-width: 440px; width: 100%; animation: dzFade .2s ease; min-height: 36px; display: flex; align-items: center; justify-content: center; }
  .wave-row { display: flex; align-items: center; gap: 8px; }
  .wave-bars { display: flex; align-items: center; gap: 3px; height: 28px; }
  .bar { width: 3px; border-radius: 3px; background: var(--gold); animation: dzWave .8s infinite ease-in-out; min-height: 4px; }
  .bar:nth-child(1){ animation-delay: 0s; } .bar:nth-child(2){ animation-delay: .12s; } .bar:nth-child(3){ animation-delay: .24s; } .bar:nth-child(4){ animation-delay: .36s; } .bar:nth-child(5){ animation-delay: .48s; }
  .speak-label { color: var(--blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .voice-controls { display: flex; gap: 16px; align-items: center; }
  #mic-btn { width: 68px; height: 68px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transition: all .25s; -webkit-appearance: none; }
  #mic-btn.idle { background: linear-gradient(135deg, var(--gold), #7a4f0a); color: var(--bg); box-shadow: 0 4px 20px rgba(201,168,76,.35); }
  #mic-btn.listening { background: linear-gradient(135deg, var(--red), #a03020); color: #fff; animation: dzMicPulse 1.2s infinite; }
  #mic-btn.disabled { background: rgba(255,255,255,.04); color: #444; cursor: not-allowed; }
  #stop-speak-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(126,200,227,.3); background: rgba(126,200,227,.08); color: var(--blue); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; animation: dzSpeakPulse 1.5s infinite; -webkit-appearance: none; }
  #voice-send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--bg); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 14px rgba(201,168,76,.3); -webkit-appearance: none; }
  #mic-hint { color: #2e2510; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
  #mic-error { color: var(--red); font-size: 12px; text-align: center; max-width: 340px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="splash">
  <div class="grid-bg"></div>
  <div class="glow-bg"></div>
  <div class="splash-inner">
    <div class="logo-mark">DZ</div>
    <div class="eyebrow">Objection Eliminator</div>
    <div class="logo-text">DoubtZero X</div>
    <p class="tagline">Every excuse you have has a name.<br>I know all of them.</p>
    <div class="mode-toggle">
      <button class="mode-btn active" id="splash-text-btn" onclick="setSplashMode('text')">💬 Text Mode</button>
      <button class="mode-btn" id="splash-voice-btn" onclick="setSplashMode('voice')">🎙️ Voice Mode</button>
    </div>
    <button class="cta-btn" onclick="beginSession()">Face Your Doubts →</button>
    <p class="fine-print">No filters · No comfort zone</p>
  </div>
</div>

<div id="chat">
  <div id="header">
    <div class="avatar">DZ</div>
    <div>
      <div class="header-name">DoubtZero X</div>
      <div class="header-status" id="status-label">● Locked In</div>
    </div>
    <div class="header-mode">
      <button class="hm-btn active" id="hm-text" onclick="setMode('text')">💬 Text</button>
      <button class="hm-btn" id="hm-voice" onclick="setMode('voice')">🎙️ Voice</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="text-ui">
      <div class="text-row">
        <textarea id="msg" rows="1" placeholder="Tell me your real excuse…"></textarea>
        <button class="send-btn inactive" id="send-btn" aria-label="Send Message" onclick="sendText()">→</button>
      </div>
      <p class="hint">Tap → to send</p>
    </div>

    <div id="voice-ui" class="hidden">
      <div id="voice-area">
        <div id="transcript-box" class="hidden"></div>
        <div class="wave-row hidden" id="wave-row">
          <div class="wave-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <span class="speak-label">Speaking</span>
          <div class="wave-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>
        <div id="mic-error" class="hidden"></div>
        <div class="voice-controls">
          <button id="stop-speak-btn" class="hidden" aria-label="Stop Speaking" onclick="stopSpeaking()">⏹</button>
          <button id="mic-btn" class="idle" aria-label="Toggle Microphone" onclick="toggleMic()">🎙️</button>
          <button id="voice-send-btn" class="hidden" aria-label="Send Voice Message" onclick="sendVoiceTranscript()">→</button>
        </div>
        <p id="mic-hint">Tap mic to speak your doubt</p>
      </div>
    </div>
  </div>
</div>

<script>
let mode = 'text';
let conversationHistory = [];
let isLoading = false;
let isSpeaking = false;
let isListening = false;
let currentTranscript = '';
let recognition = null;

const QUICK_REPLIES = [
  'I feel too late already',
  'No time after work',
  "I don't know what skill to monetize",
  'Afraid of public failure',
  'I overthink everything',
  'I keep learning but never start'
];

function setSplashMode(m) {
  mode = m;
  document.getElementById('splash-text-btn').className  = 'mode-btn' + (m==='text'?' active':'');
  document.getElementById('splash-voice-btn').className = 'mode-btn' + (m==='voice'?' active':'');
}

async function beginSession() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('chat').classList.add('visible');
  
  // Unlock mobile audio explicitly on first interaction
  if (window.speechSynthesis) {
    const silentUtterance = new SpeechSynthesisUtterance('');
    silentUtterance.volume = 0;
    window.speechSynthesis.speak(silentUtterance);
  }

  applyMode();
  await sendMessage('Hi');
}

function setMode(m) {
  stopSpeaking();
  stopMic();
  mode = m;
  applyMode();
}

function applyMode() {
  document.getElementById('hm-text').className  = 'hm-btn' + (mode==='text'?' active':'');
  document.getElementById('hm-voice').className = 'hm-btn' + (mode==='voice'?' active':'');
  document.getElementById('text-ui').classList.toggle('hidden', mode !== 'text');
  document.getElementById('voice-ui').classList.toggle('hidden', mode !== 'voice');
}

async function callAI(history) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history: history })
    });
    const data = await res.json();
    return data.reply || "Something went wrong.";
  } catch (e) {
    return "Connection issue. Please check your internet.";
  }
}

async function sendMessage(text) {
  const t = text.trim();
  if (!t || isLoading) return;
  if (t !== 'Hi') addBubble('user', t);

  conversationHistory.push({ role: 'user', content: t });
  setLoading(true);
  hideChips();

  try {
    const reply = await callAI(conversationHistory);
    conversationHistory.push({ role: 'assistant', content: reply });
    addBubble('bot', reply);
    setLoading(false);

    if (mode === 'voice') speakText(reply);
    if (conversationHistory.length === 2) showChips();
  } catch(e) {
    setLoading(false);
    addBubble('bot', 'Connection issue. Please try again.');
  }
}

function addBubble(role, text) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing-indicator');
  if (typing) typing.remove();

  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'bub-avatar'; av.textContent = 'DZ';
    row.appendChild(av);
  }
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.textContent = text;
  row.appendChild(bub);
  msgs.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.id = 'typing-indicator';
  row.className = 'bubble-row bot';
  row.style.animation = 'dzFade .3s ease';
  
  const av = document.createElement('div');
  av.className = 'bub-avatar'; av.textContent = '✕';
  row.appendChild(av);

  const bub = document.createElement('div');
  bub.className = 'bubble bot';
  bub.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.appendChild(bub);
  msgs.appendChild(row);
  scrollBottom();
}

function setLoading(v) {
  isLoading = v;
  if (v) { showTyping(); setStatus('Thinking…', '#c9a84c'); } 
  else {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
    updateStatusIdle();
  }
  updateSendBtn();
}

function setStatus(label, color) {
  const el = document.getElementById('status-label');
  el.textContent = label; el.style.color = color;
}

function updateStatusIdle() {
  if (isSpeaking) setStatus('Speaking…', '#7ec8e3');
  else if (isListening) setStatus('Listening…', '#c9a84c');
  else setStatus('● Locked In','#4a7c3f');
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
}

function showChips() {
  let chips = document.getElementById('chips');
  if (chips) { chips.classList.remove('hidden'); return; }
  chips = document.createElement('div');
  chips.id = 'chips';
  QUICK_REPLIES.forEach(qr => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = qr;
    btn.onclick = () => { hideChips(); sendMessage(qr); };
    chips.appendChild(btn);
  });
  document.getElementById('messages').appendChild(chips);
  scrollBottom();
}

function hideChips() {
  const c = document.getElementById('chips');
  if (c) c.classList.add('hidden');
}

const msgArea = document.getElementById('msg');
const sendBtn = document.getElementById('send-btn');

msgArea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  updateSendBtn();
});

msgArea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

function updateSendBtn() {
  const active = msgArea.value.trim() && !isLoading;
  sendBtn.className = 'send-btn ' + (active ? 'active' : 'inactive');
}

function sendText() {
  const t = msgArea.value.trim();
  if (!t || isLoading) return;
  msgArea.value = ''; msgArea.style.height = 'auto';
  updateSendBtn(); sendMessage(t);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /daniel|alex|google uk|oliver|en-gb/i.test(v.name + v.lang)) || voices.find(v => /en/i.test(v.lang)) || voices[0];
  if (preferred) utt.voice = preferred;
  utt.rate = 0.92; utt.pitch = 0.88; utt.volume = 1;

  utt.onstart = () => {
    isSpeaking = true;
    document.getElementById('wave-row').classList.remove('hidden');
    document.getElementById('stop-speak-btn').classList.remove('hidden');
    document.getElementById('mic-btn').className = 'disabled';
    setStatus('Speaking…', '#7ec8e3');
  };
  utt.onend = utt.onerror = () => {
    isSpeaking = false;
    document.getElementById('wave-row').classList.add('hidden');
    document.getElementById('stop-speak-btn').classList.add('hidden');
    document.getElementById('mic-btn').className = isLoading ? 'disabled' : 'idle';
    updateStatusIdle();
  };

  if (voices.length === 0) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.speak(utt);
  else window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('wave-row').classList.add('hidden');
  document.getElementById('stop-speak-btn').classList.add('hidden');
  document.getElementById('mic-btn').className = isLoading ? 'disabled' : 'idle';
  updateStatusIdle();
}

function toggleMic() {
  if (isListening) stopMic(); else startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showMicError('Voice input not supported on this browser. Try Chrome or Safari.'); return; }
  hideMicError(); stopSpeaking(); currentTranscript = '';

  recognition = new SR();
  recognition.lang = 'en-US'; recognition.interimResults = true; recognition.maxAlternatives = 1; recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').className = 'listening';
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('transcript-box').classList.remove('hidden');
    document.getElementById('transcript-box').textContent = 'Listening…';
    document.getElementById('voice-send-btn').classList.add('hidden');
    document.getElementById('mic-hint').textContent = 'Tap ⏹ to stop & send';
    setStatus('Listening…', '#c9a84c');
  };

  recognition.onresult = (e) => {
    currentTranscript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('transcript-box').textContent = currentTranscript || 'Listening…';
  };

  recognition.onerror = (e) => {
    stopMic();
    if (e.error === 'not-allowed') showMicError('Microphone access denied. Enable it in your browser settings.');
    else if (e.error === 'network') showMicError('Network error. Check your connection.');
    else showMicError('Voice error: ' + e.error);
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').className = isLoading ? 'disabled' : 'idle';
    document.getElementById('mic-btn').textContent = '🎙️';
    document.getElementById('mic-hint').textContent = 'Tap mic to speak your doubt';
    updateStatusIdle();

    const t = currentTranscript.trim();
    if (t) {
      setTimeout(() => {
        document.getElementById('transcript-box').classList.add('hidden');
        document.getElementById('voice-send-btn').classList.add('hidden');
        sendMessage(t); currentTranscript = '';
      }, 400);
    } else { document.getElementById('transcript-box').classList.add('hidden'); }
  };

  try { recognition.start(); } catch(e) { showMicError('Could not start mic: ' + e.message); }
}

function stopMic() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  isListening = false;
  document.getElementById('mic-btn').className = isLoading ? 'disabled' : 'idle';
  document.getElementById('mic-btn').textContent = '🎙️';
  document.getElementById('mic-hint').textContent = 'Tap mic to speak your doubt';
  updateStatusIdle();
  if (currentTranscript.trim()) document.getElementById('voice-send-btn').classList.remove('hidden');
}

function sendVoiceTranscript() {
  const t = currentTranscript.trim(); if (!t) return;
  document.getElementById('transcript-box').classList.add('hidden');
  document.getElementById('voice-send-btn').classList.add('hidden');
  currentTranscript = ''; sendMessage(t);
}

function showMicError(msg) { const el = document.getElementById('mic-error'); el.textContent = msg; el.classList.remove('hidden'); }
function hideMicError() { document.getElementById('mic-error').classList.add('hidden'); }

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
document.body.addEventListener('touchmove', e => { if (e.target === document.body) e.preventDefault(); }, { passive: false });
</script>
</body>
